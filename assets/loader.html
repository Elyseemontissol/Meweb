<!-- LOADER OVERLAY: Montissol Essentials logo reveal animation -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap">
<div id="pageLoader" class="page-loader" aria-label="Loading" role="status">
  <div class="me-loader">
    <!-- Mark + wordmark row -->
    <div class="me-row">
      <!-- 4 chevrons -->
      <div class="me-chev-group">
        <svg class="me-chev me-chev--1" viewBox="0 0 100 170" aria-hidden="true">
          <path d="M 0 0 L 55 0 L 100 85 L 55 170 L 0 170 L 45 85 Z" />
        </svg>
        <svg class="me-chev me-chev--2" viewBox="0 0 100 170" aria-hidden="true">
          <path d="M 0 0 L 55 0 L 100 85 L 55 170 L 0 170 L 45 85 Z" />
        </svg>
        <svg class="me-chev me-chev--3" viewBox="0 0 100 170" aria-hidden="true">
          <path d="M 0 0 L 55 0 L 100 85 L 55 170 L 0 170 L 45 85 Z" />
        </svg>
        <svg class="me-chev me-chev--4 me-chev--white" viewBox="0 0 100 170" aria-hidden="true">
          <path d="M 0 0 L 55 0 L 100 85 L 55 170 L 0 170 L 45 85 Z" />
        </svg>
      </div>

      <!-- Divider -->
      <div class="me-divider"></div>

      <!-- Wordmark -->
      <div class="me-wordmark">
        <div class="me-mont">MONTISSOL</div>
        <div class="me-ess">ESSENTIALS</div>
      </div>
    </div>

    <!-- Tagline with rule lines -->
    <div class="me-tagline">
      <div class="me-rule me-rule--l"></div>
      <div class="me-tag-text">Facility Management Services</div>
      <div class="me-rule me-rule--r"></div>
    </div>
  </div>
</div>

<style>
  .page-loader {
    position: fixed; inset: 0; z-index: 999999;
    display: grid; place-items: center;
    background: #000;
    transition: opacity .5s ease, visibility .5s ease;
    overflow: hidden;
  }
  .page-loader.is-hidden {
    opacity: 0; visibility: hidden; pointer-events: none;
  }
  .page-loader::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #1a1715 0%, #000 65%, #050505 100%);
    opacity: 0.85;
    pointer-events: none;
  }

  .me-loader {
    position: relative;
    color: #fff;
    font-family: 'Oswald', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-align: center;
    transform: translateZ(0);
    animation: me-breathe 6s ease-in-out infinite;
  }

  .me-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 18px;
  }

  /* ── Chevron group ── */
  .me-chev-group {
    position: relative;
    display: flex;
    align-items: center;
    width: 165px;
    height: 95px;
  }
  .me-chev {
    position: absolute;
    top: 0;
    width: 56px;
    height: 95px;
    fill: #E8501F;
    opacity: 0;
    transform: translateX(-28px);
    animation: me-chev-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .me-chev--1 { left: 0;   animation-delay: 0.0s; }
  .me-chev--2 { left: 32px; animation-delay: 0.1s; }
  .me-chev--3 { left: 64px; animation-delay: 0.2s; }
  .me-chev--4 { left: 96px; animation-delay: 0.3s; fill: #fff; }

  /* ── Divider ── */
  .me-divider {
    width: 2px;
    height: 105px;
    background: #fff;
    transform-origin: center;
    transform: scaleY(0);
    animation: me-grow-y 0.5s cubic-bezier(0.65, 0, 0.35, 1) 0.7s forwards;
  }

  /* ── Wordmark ── */
  .me-wordmark {
    text-align: left;
    opacity: 0;
    transform: translateX(-12px);
    clip-path: inset(0 100% 0 0);
    -webkit-clip-path: inset(0 100% 0 0);
    animation: me-wipe-in 0.9s cubic-bezier(0.65, 0, 0.35, 1) 1.0s forwards;
  }
  .me-mont {
    font-weight: 700;
    font-size: 52px;
    line-height: 0.92;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    white-space: nowrap;
    color: #fff;
  }
  .me-ess {
    font-weight: 600;
    font-size: 44px;
    line-height: 1;
    letter-spacing: 0.038em;
    text-transform: uppercase;
    white-space: nowrap;
    color: #fff;
    margin-top: 4px;
  }

  /* ── Tagline ── */
  .me-tagline {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 380px;
    max-width: 100%;
    margin: 0 auto;
  }
  .me-rule {
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.85);
    transform: scaleX(0);
    animation: me-grow-x 0.6s cubic-bezier(0.65, 0, 0.35, 1) 1.8s forwards;
  }
  .me-rule--l { transform-origin: right center; }
  .me-rule--r { transform-origin: left center; }
  .me-tag-text {
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    white-space: nowrap;
    color: #fff;
    opacity: 0;
    transform: translateY(6px);
    animation: me-fade-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) 2.1s forwards;
  }

  /* ── Keyframes ── */
  @keyframes me-chev-in {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes me-grow-y {
    to { transform: scaleY(1); }
  }
  @keyframes me-wipe-in {
    to {
      opacity: 1;
      transform: translateX(0);
      clip-path: inset(0 0 0 0);
      -webkit-clip-path: inset(0 0 0 0);
    }
  }
  @keyframes me-grow-x {
    to { transform: scaleX(1); }
  }
  @keyframes me-fade-up {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes me-breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.015); }
  }

  /* Mobile scale-down */
  @media (max-width: 600px) {
    .me-loader { transform: scale(0.65); }
  }

  @media (prefers-reduced-motion: reduce) {
    .me-chev, .me-divider, .me-wordmark, .me-rule, .me-tag-text, .me-loader {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      clip-path: none !important;
      -webkit-clip-path: none !important;
    }
  }
</style>

<script>
(function () {
  // Total reveal duration (longest delay + duration) + a brief hold
  var MIN_DISPLAY_MS = 3000;
  var SAFETY_MAX_MS = 7000;

  var startedAt = Date.now();
  var pageLoaded = document.readyState === 'complete';
  var hidden = false;

  function hideLoader() {
    if (hidden) return;
    hidden = true;
    var loader = document.getElementById('pageLoader');
    if (!loader) return;
    loader.classList.add('is-hidden');
    setTimeout(function () { loader.remove(); }, 600);
  }

  function maybeHide() {
    if (!pageLoaded) return;
    var elapsed = Date.now() - startedAt;
    var remaining = Math.max(0, MIN_DISPLAY_MS - elapsed);
    setTimeout(hideLoader, remaining);
  }

  if (pageLoaded) {
    maybeHide();
  } else {
    window.addEventListener('load', function () {
      pageLoaded = true;
      maybeHide();
    });
  }

  // Safety: never show loader longer than 7s under any circumstances
  setTimeout(hideLoader, SAFETY_MAX_MS);
})();
</script>
