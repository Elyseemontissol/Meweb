<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Loader Prototype — Montissol Essentials</title>
<style>
  :root {
    --brand: #E74D10;
    --brand-light: #ff6a33;
    --amber: #f59e0b;
    --ink: #e8e8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    overflow: hidden;
  }
  .loader-stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: #000;
  }

  .loader {
    position: relative;
    width: 260px;
    height: 260px;
    display: grid;
    place-items: center;
  }

  /* ── Whirl rings around globe ── */
  .whirl {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
  }
  .whirl--outer {
    border: 1px dashed rgba(231, 77, 16, 0.35);
    animation: spin 8s linear infinite;
  }
  .whirl--outer::before,
  .whirl--outer::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--brand);
    top: -3px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 14px var(--brand);
  }
  .whirl--outer::after {
    top: auto; bottom: -3px;
    background: var(--amber);
    box-shadow: 0 0 14px var(--amber);
  }

  .whirl--mid {
    inset: 14px;
    border: 1px solid rgba(245, 158, 11, 0.18);
    animation: spinReverse 6s linear infinite;
  }

  .whirl--inner {
    inset: 24px;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(231, 77, 16, 0.55) 45deg,
      transparent 90deg,
      transparent 180deg,
      rgba(245, 158, 11, 0.35) 225deg,
      transparent 270deg,
      transparent 360deg
    );
    mask: radial-gradient(circle, transparent 52%, #000 53%, #000 57%, transparent 58%);
    -webkit-mask: radial-gradient(circle, transparent 52%, #000 53%, #000 57%, transparent 58%);
    animation: spin 2.5s linear infinite;
  }

  /* ── Globe ── */
  .globe-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    filter: drop-shadow(0 0 30px rgba(231, 77, 16, 0.35));
  }
  #globe {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Glow pulse on the globe's edge */
  .glow-pulse {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(231, 77, 16, 0.5);
    animation: pulse 2.2s ease-out infinite;
    pointer-events: none;
  }

  /* ── Brand text ── */
  .brand-label {
    position: absolute;
    bottom: -56px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    white-space: nowrap;
    font-weight: 900;
    font-size: 0.9rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--brand-light) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: textFade 2.5s ease-in-out infinite;
  }
  .brand-label::after {
    content: '';
    display: block;
    width: 40px;
    height: 2px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--brand), transparent);
  }

  /* ── Animations ── */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes spinReverse {
    from { transform: rotate(360deg); }
    to   { transform: rotate(0deg); }
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(231, 77, 16, 0.55); }
    100% { box-shadow: 0 0 0 34px rgba(231, 77, 16, 0); }
  }
  @keyframes textFade {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .whirl--outer, .whirl--mid, .whirl--inner,
    .glow-pulse, .brand-label {
      animation: none !important;
    }
  }

  .preview-hint {
    position: fixed;
    top: 20px; left: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="preview-hint">Loader Prototype · 260×260 container · 200×200 globe · real country outlines</div>

<div class="loader-stage">
  <div class="loader">

    <div class="whirl whirl--outer"></div>
    <div class="whirl whirl--mid"></div>
    <div class="whirl whirl--inner"></div>

    <div class="globe-wrap">
      <canvas id="globe" width="400" height="400"></canvas>
    </div>

    <div class="brand-label">Montissol Essentials L.L.C</div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>
(async function () {
  const canvas = document.getElementById('globe');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 200;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  const BRAND = '#E74D10';
  const BRAND_LIGHT = '#ff6a33';
  const AMBER = '#f59e0b';
  const GRID = 'rgba(231,77,16,0.18)';
  const RING = 'rgba(231,77,16,0.55)';
  const OCEAN = 'rgba(231,77,16,0.04)';

  const projection = d3.geoOrthographic()
    .scale(size / 2 - 4)
    .translate([size / 2, size / 2])
    .clipAngle(90)
    .rotate([0, -20, 0]);

  const path = d3.geoPath(projection, ctx);
  const graticule = d3.geoGraticule10();
  const sphere = { type: 'Sphere' };

  // Load real country data (natural earth 110m)
  const worldUrl = 'https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json';
  let land, countries;
  try {
    const world = await fetch(worldUrl).then(r => r.json());
    land = topojson.feature(world, world.objects.land);
    countries = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
  } catch (err) {
    console.error('Could not load world map:', err);
    return;
  }

  function draw() {
    ctx.clearRect(0, 0, size, size);

    // Sphere (filled ocean)
    ctx.beginPath();
    path(sphere);
    ctx.fillStyle = OCEAN;
    ctx.fill();

    // Graticule (lat/lon grid)
    ctx.beginPath();
    path(graticule);
    ctx.strokeStyle = GRID;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Land
    ctx.beginPath();
    path(land);
    const grad = ctx.createRadialGradient(
      size * 0.35, size * 0.35, 10,
      size / 2, size / 2, size / 2
    );
    grad.addColorStop(0, BRAND_LIGHT);
    grad.addColorStop(0.5, BRAND);
    grad.addColorStop(1, '#8a2d06');
    ctx.fillStyle = grad;
    ctx.fill();

    // Country borders
    ctx.beginPath();
    path(countries);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Outer sphere stroke
    ctx.beginPath();
    path(sphere);
    ctx.strokeStyle = RING;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  let lon = 0;
  const rotationSpeed = 0.25; // degrees per frame
  function animate() {
    lon = (lon + rotationSpeed) % 360;
    projection.rotate([lon, -20, 0]);
    draw();
    requestAnimationFrame(animate);
  }

  // Respect reduced motion
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    draw();
  } else {
    animate();
  }
})();
</script>
</body>
</html>
